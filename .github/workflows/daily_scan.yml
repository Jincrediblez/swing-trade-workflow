name: Daily Market Scan

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deterministic scan basket
        run: python scripts/daily_scan.py --output output/daily_scan

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan
          path: output/daily_scan/
          retention-days: 30
